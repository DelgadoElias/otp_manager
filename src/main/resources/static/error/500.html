<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Server Error</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }
    .card {
      text-align: center;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .code {
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f87171, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.5rem; }
    p  { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.75rem; }
    a {
      display: inline-block;
      padding: 0.7rem 1.75rem;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      border-radius: 10px;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">500</div>
    <h1>Internal server error</h1>
    <p>Something went wrong on our end.<br>Try again in a moment.</p>
    <a href="/swagger-ui.html">View API Docs</a>
  </div>
</body>
</html>
