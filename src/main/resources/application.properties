spring.application.name=otp-manager

# Database — set these via environment variables
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/otp_manager}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Flyway manages the schema; Hibernate only validates
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# App
app.name=${OTP_APP_NAME:MyApp}
app.secret.expiration-days=${OTP_SECRET_EXPIRATION_DAYS:30}

# Actuator health endpoint (used by Railway healthcheck)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never