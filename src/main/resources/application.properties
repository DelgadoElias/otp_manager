spring.application.name=otp-manager

# Database — set these via environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Flyway manages the schema; Hibernate only validates
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# App
app.name=${OTP_APP_NAME:MyApp}
app.secret.expiration-days=${OTP_SECRET_EXPIRATION_DAYS:30}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4321}

# Rate limiting (per IP)
rate-limit.per-minute=${RATE_LIMIT_PER_MINUTE:5}
rate-limit.per-hour=${RATE_LIMIT_PER_HOUR:20}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Error pages
server.error.whitelabel.enabled=false

# Actuator health endpoint (used by Railway healthcheck)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Memory optimizations
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=4
spring.jpa.open-in-view=false
spring.main.lazy-initialization=true